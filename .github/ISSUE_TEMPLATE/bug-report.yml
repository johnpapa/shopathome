name: 🐛 Bug Report
description: Report a bug in one of the Shop at Home apps
title: "[Bug]: "
labels: ["bug"]
body:
  - type: dropdown
    id: app
    attributes:
      label: Affected App
      description: Which app are you experiencing the bug in?
      options:
        - Angular (angular-app)
        - React (react-app)
        - Svelte (svelte-app)
        - Vue (vue-app)
        - Azure Functions API (api)
        - Fastify API (fastify-api-server)
        - Multiple apps
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Output of `node --version`
      placeholder: "v20.x.x"

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "macOS 14, Windows 11, Ubuntu 22.04"

  - type: input
    id: browser
    attributes:
      label: Browser (if frontend bug)
      placeholder: "Chrome 120, Firefox 121, Safari 17"

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (console errors, logs, etc.)
